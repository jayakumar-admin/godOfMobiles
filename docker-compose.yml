version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: gom_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: godofmobiles
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Node.js Express.js API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gom_backend_api
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: godofmobiles
      DB_PORT: 5432
      JWT_SECRET: supersecretjwtkeyforgodofmobilesadmin123
      ADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # 3. Angular Nginx Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gom_frontend_app
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
